<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>Panel — Artilugios</title>

<!-- PWA Config (Para instalar en el celular) -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#110a05">
<link rel="apple-touch-icon" href="logo.png">

<!-- Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Crimson+Pro:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

<!-- Supabase -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase-config.js"></script>

<style>
:root { --bg: #110a05; --surface: #1e120a; --surface2: #2a1a0e; --border: rgba(201,162,77,.18); --gold: #c9a24d; --gold-dim: rgba(201,162,77,.55); --text: #f0e6cc; --muted: #a89070; --danger: #c0392b; --success: #2ecc71; --radius: 12px; --trans: .25s ease; }
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
body { font-family: 'Crimson Pro', Georgia, serif; background: var(--bg); color: var(--text); min-height: 100vh; overflow-x: hidden; }
::-webkit-scrollbar { width:5px; } ::-webkit-scrollbar-track { background: var(--surface); } ::-webkit-scrollbar-thumb { background: var(--gold-dim); border-radius:4px; }

/* LOGIN */
#login-screen { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: radial-gradient(ellipse at 20% 50%, rgba(201,162,77,.07) 0%, transparent 60%), radial-gradient(ellipse at 80% 20%, rgba(180,80,20,.08) 0%, transparent 50%), var(--bg); padding: 24px; }
.login-card { width: 100%; max-width: 380px; background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 48px 36px; text-align: center; box-shadow: 0 40px 80px rgba(0,0,0,.6); }
.login-card .brand { font-family: 'Cinzel', serif; font-size: 1.5rem; letter-spacing: 4px; color: var(--gold); margin-bottom: 6px; }
.login-card .subtitle { font-size: .95rem; color: var(--muted); letter-spacing: 2px; margin-bottom: 40px; }
.field { margin-bottom: 18px; text-align: left; }
.field label { display: block; font-size: .8rem; letter-spacing: 2px; color: var(--muted); margin-bottom: 8px; font-family: 'Cinzel', serif; }
.field input { width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 16px; color: var(--text); font-family: 'Crimson Pro', serif; font-size: 1rem; outline: none; transition: border-color var(--trans); }
.field input:focus { border-color: var(--gold); }
.btn-primary { width: 100%; padding: 15px; background: linear-gradient(135deg, rgba(201,162,77,.2), rgba(201,162,77,.35)); border: 1px solid var(--gold); border-radius: var(--radius); color: var(--gold); font-family: 'Cinzel', serif; font-size: .85rem; letter-spacing: 3px; cursor: pointer; transition: all var(--trans); margin-top: 8px; }
.btn-primary:hover { background: rgba(201,162,77,.3); box-shadow: 0 0 24px rgba(201,162,77,.3); }

/* APP */
#app { display: none; min-height: 100vh; }
.topbar { position: sticky; top: 0; z-index: 100; height: 60px; background: rgba(17,10,5,.92); backdrop-filter: blur(10px); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 20px; }
.topbar .brand { font-family: 'Cinzel', serif; font-size: 1rem; letter-spacing: 3px; color: var(--gold); }
.topbar-actions { display: flex; gap: 12px; align-items: center; }
.icon-btn { width: 36px; height: 36px; background: transparent; border: 1px solid var(--border); border-radius: 8px; color: var(--muted); font-size: .95rem; cursor: pointer; display: flex; align-items: center; justify-content: center; }
.icon-btn:hover { border-color: var(--gold); color: var(--gold); }
.tabs { display: flex; gap: 0; background: var(--surface); border-bottom: 1px solid var(--border); overflow-x: auto; }
.tab-btn { flex: 0 0 auto; padding: 14px 22px; background: none; border: none; border-bottom: 2px solid transparent; color: var(--muted); font-family: 'Cinzel', serif; font-size: .75rem; letter-spacing: 2px; cursor: pointer; }
.tab-btn.active { color: var(--gold); border-bottom-color: var(--gold); }
.main { padding: 24px 20px; max-width: 900px; margin: 0 auto; }
.section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 18px; }
.section-title { font-family: 'Cinzel', serif; font-size: 1rem; letter-spacing: 2px; color: var(--gold); }
.btn-add { padding: 10px 18px; background: linear-gradient(135deg, rgba(201,162,77,.15), rgba(201,162,77,.28)); border: 1px solid var(--gold-dim); border-radius: 30px; color: var(--gold); cursor: pointer; font-family: 'Cinzel', serif; font-weight: bold;}

/* GRID & CARDS */
.products-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 16px; margin-top:20px; }
.product-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; transition: opacity var(--trans); }
.product-card.inactivo { opacity: 0.45; }
.product-img { width: 100%; height: 160px; object-fit: cover; }
.product-body { padding: 16px; }
.product-name { font-family: 'Cinzel', serif; font-size: .95rem; color: var(--text); margin-bottom: 5px; }
.product-actions { display: flex; gap: 8px; margin-top: 12px; align-items: center; }
.action-btn { flex: 1; padding: 8px; border-radius: 8px; border: 1px solid var(--border); background: var(--surface2); color: var(--muted); cursor: pointer; font-family: 'Crimson Pro', serif;}
.action-btn.delete:hover { color: #e74c3c; border-color: rgba(231,76,60,.4); }

/* TOGGLE ACTIVO */
.toggle-wrap { display: flex; align-items: center; gap: 8px; margin-top: 12px; }
.toggle-label { font-family: 'Cinzel', serif; font-size: .7rem; letter-spacing: 1px; color: var(--muted); }
.toggle { position: relative; width: 44px; height: 24px; flex-shrink: 0; }
.toggle input { opacity: 0; width: 0; height: 0; }
.toggle-slider { position: absolute; inset: 0; background: var(--surface2); border: 1px solid var(--border); border-radius: 24px; cursor: pointer; transition: background var(--trans), border-color var(--trans); }
.toggle-slider::before { content: ''; position: absolute; left: 3px; top: 50%; transform: translateY(-50%); width: 16px; height: 16px; background: var(--muted); border-radius: 50%; transition: transform var(--trans), background var(--trans); }
.toggle input:checked + .toggle-slider { background: rgba(46,204,113,.15); border-color: var(--success); }
.toggle input:checked + .toggle-slider::before { transform: translate(20px, -50%); background: var(--success); }

/* MODAL */
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.8); z-index: 200; display: flex; align-items: center; justify-content: center; opacity: 0; pointer-events: none; transition: opacity .3s ease; }
.modal-overlay.open { opacity: 1; pointer-events: all; }
.modal { width: 100%; max-width: 600px; max-height: 90vh; background: var(--surface); border: 1px solid var(--border); border-radius: 20px; overflow-y: auto; padding: 28px 24px; }
.modal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
.form-group { margin-bottom: 18px; }
.form-group label { display: block; font-size: .75rem; color: var(--muted); margin-bottom: 8px; font-family: 'Cinzel', serif; }
.form-group input, .form-group textarea, .form-group select { width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius); padding: 13px 16px; color: var(--text); font-family: 'Crimson Pro', serif; }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }

/* ÁREA DE IMÁGENES */
.img-upload-area { border: 2px dashed var(--border); padding: 20px; text-align: center; cursor: pointer; position: relative; border-radius: 10px; transition: 0.3s;}
.img-upload-area:hover { border-color: var(--gold); background: rgba(201,162,77,0.05); }
.img-upload-area input { position: absolute; inset: 0; opacity: 0; cursor: pointer; }
.preview-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-top: 15px; }

/* MINIATURAS CON BOTÓN DE BORRAR */
.img-wrap { position: relative; width: 100%; height: 80px; border-radius: 8px; }
.img-wrap img { width: 100%; height: 100%; object-fit: cover; border-radius: 8px; border: 1px solid var(--border); }
.img-wrap .del-btn { position: absolute; top: -8px; right: -8px; background: var(--danger); color: white; border: none; border-radius: 50%; width: 24px; height: 24px; font-size: 12px; cursor: pointer; display: flex; align-items: center; justify-content: center; box-shadow: 0 2px 5px rgba(0,0,0,0.5); transition: 0.2s;}
.img-wrap .del-btn:hover { transform: scale(1.1); background: #e74c3c; }

.form-actions { display: flex; gap: 12px; margin-top: 20px; }
.btn-save { flex: 1; padding: 14px; background: var(--gold); border: none; border-radius: var(--radius); color: #000; font-family: 'Cinzel', serif; font-weight: bold; cursor: pointer; transition: 0.3s; }
.btn-save:hover { box-shadow: 0 0 15px rgba(201,162,77,0.5); }
.btn-cancel { padding: 14px 20px; background: transparent; border: 1px solid var(--border); color: var(--muted); border-radius: var(--radius); font-family: 'Cinzel', serif; cursor: pointer; }
.toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: var(--gold); color: #000; padding: 10px 20px; border-radius: 20px; opacity: 0; transition: 0.3s; z-index: 999; font-weight: bold; }
.toast.show { opacity: 1; }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-card">
    <div class="brand">ARTILUGIOS</div>
    <div class="subtitle">PANEL DE GESTIÓN</div>
    <div class="field"><label>CORREO</label><input type="email" id="loginEmail"/></div>
    <div class="field"><label>CONTRASEÑA</label><input type="password" id="loginPass"/></div>
    <button class="btn-primary" onclick="handleLogin()">INGRESAR</button>
  </div>
</div>

<!-- APP -->
<div id="app">
  <div class="topbar">
    <div class="brand">✦ PANEL DE CONTROL</div>
    <button class="icon-btn" onclick="location.reload()"><i class="fas fa-sync-alt"></i></button>
  </div>
  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('all', this)">TODO</button>
    <button class="tab-btn" onclick="switchTab('santeria', this)">SANTERÍA</button>
    <button class="tab-btn" onclick="switchTab('vivero', this)">VIVERO</button>
    <button class="tab-btn" onclick="switchTab('oraculo', this)">ORÁCULO</button>
  </div>
  <div class="main">
    <div class="section-header">
      <div class="section-title">PRODUCTOS</div>
      <button class="btn-add" onclick="openModal()"><i class="fas fa-plus"></i> AGREGAR</button>
    </div>
    <div class="products-grid" id="productsGrid"></div>
  </div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-header">
      <div class="section-title" id="modalTitle">NUEVO PRODUCTO</div>
      <button class="icon-btn" onclick="closeModal()"><i class="fas fa-times"></i></button>
    </div>
    <input type="hidden" id="productId"/>

    <div class="form-group"><label>SECCIÓN</label><select id="productSection"><option value="santeria">Santería</option><option value="vivero">Vivero</option><option value="oraculo">Oráculo</option></select></div>
    <div class="form-group"><label>NOMBRE</label><input type="text" id="productName"/></div>
    <div class="form-group"><label>DESCRIPCIÓN BREVE (Tarjeta)</label><input type="text" id="productDesc" placeholder="Se ve en el catálogo principal"/></div>
    <div class="form-group"><label>DESCRIPCIÓN LARGA (Al hacer clic)</label><textarea id="productDescLarga" rows="4" placeholder="Modo de uso, detalles del producto, propiedades..."></textarea></div>
    <div class="form-row">
      <div class="form-group"><label>PRECIO ($ UYU)</label><input type="number" id="productPrice"/></div>
      <div class="form-group"><label>CATEGORÍA (Filtro)</label><input type="text" id="productCategory" placeholder="Ej: velas, hierbas"/></div>
    </div>
    <div class="form-group">
      <label>GALERÍA DE IMÁGENES</label>
      <div class="img-upload-area">
        <input type="file" id="imgFile" accept="image/*" multiple onchange="agregarNuevasFotos(event)"/>
        <i class="fas fa-images" style="font-size:2rem;color:var(--muted)"></i>
        <p style="color:var(--muted); margin-top:10px;">Tocá para agregar más fotos<br>(No borra las anteriores)</p>
      </div>
      <!-- Aquí se pintan las miniaturas -->
      <div class="preview-grid" id="previewGrid"></div>
    </div>
    <div class="form-actions">
      <button class="btn-cancel" onclick="closeModal()">CANCELAR</button>
      <button class="btn-save" id="saveBtn" onclick="saveProduct()">GUARDAR</button>
    </div>
  </div>
</div>

<div class="toast" id="toast">Notificación</div>

<script>
const { createClient } = supabase;
let sb; 
let allProducts = []; 
let currentSection = 'all'; 

// Variables para la galería
let fotosGuardadas = []; // URLs que ya están en Supabase
let fotosNuevas = [];    // Archivos nuevos que Agus acaba de elegir

window.onload = async () => {
    sb = createClient(window.SUPABASE_URL, window.SUPABASE_ANON_KEY);
    const { data: { session } } = await sb.auth.getSession();
    if(session) showApp();
}

async function handleLogin() {
    const e = document.getElementById('loginEmail').value, p = document.getElementById('loginPass').value;
    const { error } = await sb.auth.signInWithPassword({ email: e, password: p });
    if(!error) showApp(); else alert("Error de credenciales");
}

async function showApp() {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    await loadProducts();
}

async function loadProducts() {
    const { data } = await sb.from('productos').select('*').order('created_at', { ascending: false });
    allProducts = data || []; renderProducts();
}

function switchTab(sec, btn) {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active'); currentSection = sec; renderProducts();
}

function renderProducts() {
    const grid = document.getElementById('productsGrid');
    const list = currentSection === 'all' ? allProducts : allProducts.filter(p => p.seccion === currentSection);
    grid.innerHTML = list.map(p => `
        <div class="product-card ${p.activo ? '' : 'inactivo'}" id="card-${p.id}">
            <img src="${p.imagen_url || 'https://via.placeholder.com/300x200?text=Sin+Foto'}" class="product-img">
            <div class="product-body">
                <div class="product-name">${p.nombre}</div>
                <div style="color:var(--gold)">$${p.precio || '0'}</div>
                <div class="product-actions">
                    <button class="action-btn" onclick="openModal('${p.id}')">Editar</button>
                    <button class="action-btn delete" onclick="deleteProd('${p.id}')">Borrar</button>
                </div>
                <div class="toggle-wrap">
                    <label class="toggle">
                        <input type="checkbox" ${p.activo ? 'checked' : ''} onchange="toggleActivo('${p.id}', this.checked)"/>
                        <span class="toggle-slider"></span>
                    </label>
                    <span class="toggle-label" id="toggle-label-${p.id}">${p.activo ? 'VISIBLE' : 'OCULTO'}</span>
                </div>
            </div>
        </div>
    `).join('');
}

async function toggleActivo(id, activo) {
    // Actualizar visualmente la card al instante
    const card = document.getElementById('card-' + id);
    const label = document.getElementById('toggle-label-' + id);
    if(activo) {
        card.classList.remove('inactivo');
        label.textContent = 'VISIBLE';
    } else {
        card.classList.add('inactivo');
        label.textContent = 'OCULTO';
    }
    // Actualizar en Supabase
    const { error } = await sb.from('productos').update({ activo }).eq('id', id);
    if(error) {
        showToast('Error al guardar');
    } else {
        // Actualizar en memoria local también
        const prod = allProducts.find(p => p.id === id);
        if(prod) prod.activo = activo;
        showToast(activo ? 'Producto visible' : 'Producto oculto');
    }
}

// Comprimir a WEBP
function compressImageToWebP(file, maxWidth = 800, quality = 0.8) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.readAsDataURL(file);
    reader.onload = (e) => {
      const img = new Image();
      img.src = e.target.result;
      img.onload = () => {
        const canvas = document.createElement('canvas');
        let width = img.width, height = img.height;
        if (width > maxWidth) { height = Math.round((height * maxWidth) / width); width = maxWidth; }
        canvas.width = width; canvas.height = height;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, width, height);
        canvas.toBlob((blob) => resolve(blob), 'image/webp', quality);
      };
    };
  });
}

function openModal(id=null) {
    document.getElementById('modalOverlay').classList.add('open');
    document.getElementById('productId').value = id || '';
    document.getElementById('imgFile').value = '';
    fotosGuardadas = [];
    fotosNuevas = [];
    
    if(id) {
        document.getElementById('modalTitle').textContent = "EDITAR PRODUCTO";
        const p = allProducts.find(x => x.id === id);
        document.getElementById('productSection').value = p.seccion;
        document.getElementById('productName').value = p.nombre;
        document.getElementById('productDesc').value = p.descripcion || '';
        document.getElementById('productDescLarga').value = p.descripcion_larga || '';
        document.getElementById('productPrice').value = p.precio || '';
        document.getElementById('productCategory').value = p.categoria || '';
        
        // Cargar fotos existentes
        fotosGuardadas = p.galeria_urls && p.galeria_urls.length > 0 ? [...p.galeria_urls] : (p.imagen_url ? [p.imagen_url] : []);
    } else {
        document.getElementById('modalTitle').textContent = "NUEVO PRODUCTO";
        document.getElementById('productName').value = '';
        document.getElementById('productDesc').value = '';
        document.getElementById('productDescLarga').value = '';
        document.getElementById('productPrice').value = '';
        document.getElementById('productCategory').value = '';
    }
    dibujarGaleria();
}

function closeModal() { document.getElementById('modalOverlay').classList.remove('open'); }

// Almacenar temporalmente los archivos nuevos elegidos
function agregarNuevasFotos(e) {
    Array.from(e.target.files).forEach(file => {
        fotosNuevas.push({
            id: Date.now() + Math.random(), // id temporal para poder borrarla
            file: file,
            previewUrl: URL.createObjectURL(file)
        });
    });
    document.getElementById('imgFile').value = ''; // Reset input
    dibujarGaleria();
}

function dibujarGaleria() {
    const grid = document.getElementById('previewGrid');
    grid.innerHTML = '';
    
    // Dibujar las que ya estaban guardadas
    fotosGuardadas.forEach((url, index) => {
        grid.innerHTML += `
        <div class="img-wrap">
            <img src="${url}">
            <button class="del-btn" onclick="borrarFotoGuardada(${index})"><i class="fas fa-times"></i></button>
        </div>`;
    });

    // Dibujar las nuevas (semi-transparentes para diferenciarlas antes de guardar)
    fotosNuevas.forEach(fotoObj => {
        grid.innerHTML += `
        <div class="img-wrap" style="opacity: 0.7;">
            <img src="${fotoObj.previewUrl}">
            <button class="del-btn" onclick="borrarFotoNueva(${fotoObj.id})"><i class="fas fa-times"></i></button>
        </div>`;
    });
}

function borrarFotoGuardada(index) {
    fotosGuardadas.splice(index, 1);
    dibujarGaleria();
}

function borrarFotoNueva(idTemporal) {
    fotosNuevas = fotosNuevas.filter(f => f.id !== idTemporal);
    dibujarGaleria();
}

async function saveProduct() {
    const btn = document.getElementById('saveBtn');
    btn.textContent = "GUARDANDO...";
    btn.disabled = true;

    const id = document.getElementById('productId').value;
    let urlsFinales = [...fotosGuardadas]; // Arrancamos con las viejas que no borramos
    
    // Subir las fotos nuevas a Supabase
    if(fotosNuevas.length > 0) {
        for(let i=0; i<fotosNuevas.length; i++) {
            const webpBlob = await compressImageToWebP(fotosNuevas[i].file);
            const path = `productos/${Date.now()}_${i}.webp`;
            await sb.storage.from('imagenes').upload(path, webpBlob, { contentType: 'image/webp' });
            const { data } = sb.storage.from('imagenes').getPublicUrl(path);
            urlsFinales.push(data.publicUrl); // Sumarlas a la lista final
        }
    }

    const payload = {
        seccion: document.getElementById('productSection').value,
        nombre: document.getElementById('productName').value,
        descripcion: document.getElementById('productDesc').value,
        descripcion_larga: document.getElementById('productDescLarga').value,
        precio: parseFloat(document.getElementById('productPrice').value) || 0,
        categoria: document.getElementById('productCategory').value,
        galeria_urls: urlsFinales,
        imagen_url: urlsFinales.length > 0 ? urlsFinales[0] : null // La 1era foto es la portada
    };

    if(id) await sb.from('productos').update(payload).eq('id', id);
    else await sb.from('productos').insert([payload]);

    btn.textContent = "GUARDAR";
    btn.disabled = false;
    closeModal(); 
    await loadProducts(); 
    showToast("¡Producto guardado!");
}

async function deleteProd(id) {
    if(confirm("¿Eliminar este producto permanentemente?")) {
        await sb.from('productos').delete().eq('id', id);
        await loadProducts(); showToast("Eliminado");
    }
}

function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg; t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 3000);
}

// REGISTRO DEL SERVICE WORKER (Para instalar la PWA en el celular)
if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js')
            .then(reg => console.log('PWA: Service Worker registrado exitosamente.', reg.scope))
            .catch(err => console.log('PWA: Error al registrar Service Worker: ', err));
    });
}
</script>
</body>
</html>

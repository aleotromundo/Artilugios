<!-- ============================================================
     SCRIPT DE TRACKING — ARTILUGIOS
     Pegá este bloque completo en tu catálogo (index.html o similar),
     justo antes del cierre </body>.
     Requiere que supabase-config.js ya esté cargado en la página.
     ============================================================ -->

<script>
(async function() {
  // Esperar a que Supabase esté disponible
  if (typeof supabase === 'undefined' || !window.SUPABASE_URL) return;

  const { createClient } = supabase;
  const sbTrack = createClient(window.SUPABASE_URL, window.SUPABASE_ANON_KEY);

  // Detectar dispositivo
  function getDispositivo() {
    const ua = navigator.userAgent;
    if (/Mobi|Android|iPhone/i.test(ua)) return 'mobile';
    if (/iPad|Tablet/i.test(ua)) return 'tablet';
    return 'desktop';
  }

  // Limpiar referrer para mostrarlo legible
  function getReferrer() {
    const ref = document.referrer;
    if (!ref) return 'directo';
    try {
      const host = new URL(ref).hostname.replace('www.', '');
      if (host.includes('google')) return 'google';
      if (host.includes('instagram')) return 'instagram';
      if (host.includes('facebook')) return 'facebook';
      if (host.includes('whatsapp')) return 'whatsapp';
      if (host.includes('tiktok')) return 'tiktok';
      return host;
    } catch(e) { return 'directo'; }
  }

  // Obtener país y ciudad via API gratuita (sin clave)
  async function getGeo() {
    try {
      const res = await fetch('https://ipapi.co/json/');
      const data = await res.json();
      return { pais: data.country_name || null, ciudad: data.city || null };
    } catch(e) {
      return { pais: null, ciudad: null };
    }
  }

  // Registrar una visita en Supabase
  async function registrarVisita(seccion = null, productoNombre = null, productoId = null) {
    const geo = await getGeo();
    await sbTrack.from('visitas').insert([{
      seccion,
      producto_nombre: productoNombre,
      producto_id: productoId,
      pais: geo.pais,
      ciudad: geo.ciudad,
      dispositivo: getDispositivo(),
      referrer: getReferrer(),
      user_agent: navigator.userAgent.substring(0, 200)
    }]);
  }

  // ── 1. REGISTRAR VISITA GENERAL AL ENTRAR A LA PÁGINA ──────────────
  registrarVisita();

  // ── 2. REGISTRAR CUANDO CAMBIA DE SECCIÓN ──────────────────────────
  // Escuchá el evento 'seccionCambiada' desde tu catálogo así:
  //   document.dispatchEvent(new CustomEvent('seccionCambiada', { detail: { seccion: 'santeria' } }));
  document.addEventListener('seccionCambiada', (e) => {
    if (e.detail && e.detail.seccion) {
      registrarVisita(e.detail.seccion);
    }
  });

  // ── 3. REGISTRAR CUANDO ABREN UN PRODUCTO ──────────────────────────
  // Disparás este evento cuando alguien abre el detalle de un producto:
  //   document.dispatchEvent(new CustomEvent('productoVisto', { detail: { id: p.id, nombre: p.nombre, seccion: p.seccion } }));
  document.addEventListener('productoVisto', (e) => {
    if (e.detail) {
      registrarVisita(e.detail.seccion || null, e.detail.nombre || null, e.detail.id || null);
    }
  });

})();
</script>

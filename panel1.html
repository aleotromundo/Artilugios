<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>Panel — Artilugios</title>

<!-- PWA -->
<meta name="theme-color" content="#1a0f07"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Artilugios Panel"/>
<link rel="apple-touch-icon" href="logo.png"/>
<link rel="manifest" href="panel-manifest.json"/>

<!-- Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Crimson+Pro:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

<!-- Supabase -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase-config.js"></script>

<style>
:root {
  --bg:        #110a05;
  --surface:   #1e120a;
  --surface2:  #2a1a0e;
  --border:    rgba(201,162,77,.18);
  --gold:      #c9a24d;
  --gold-dim:  rgba(201,162,77,.55);
  --text:      #f0e6cc;
  --muted:     #a89070;
  --danger:    #c0392b;
  --success:   #2ecc71;
  --radius:    12px;
  --trans:     .25s ease;
}

*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

body {
  font-family: 'Crimson Pro', Georgia, serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}

/* ── SCROLLBAR ── */
::-webkit-scrollbar { width:5px; }
::-webkit-scrollbar-track { background: var(--surface); }
::-webkit-scrollbar-thumb { background: var(--gold-dim); border-radius:4px; }

/* ══════════════════════════════════
   LOGIN
══════════════════════════════════ */
#login-screen {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  background:
    radial-gradient(ellipse at 20% 50%, rgba(201,162,77,.07) 0%, transparent 60%),
    radial-gradient(ellipse at 80% 20%, rgba(180,80,20,.08) 0%, transparent 50%),
    var(--bg);
  padding: 24px;
}

.login-card {
  width: 100%;
  max-width: 380px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 48px 36px;
  text-align: center;
  box-shadow: 0 40px 80px rgba(0,0,0,.6);
}

.login-card .brand {
  font-family: 'Cinzel', serif;
  font-size: 1.5rem;
  letter-spacing: 4px;
  color: var(--gold);
  margin-bottom: 6px;
}
.login-card .subtitle {
  font-size: .95rem;
  color: var(--muted);
  letter-spacing: 2px;
  margin-bottom: 40px;
}

.field {
  margin-bottom: 18px;
  text-align: left;
}
.field label {
  display: block;
  font-size: .8rem;
  letter-spacing: 2px;
  color: var(--muted);
  margin-bottom: 8px;
  font-family: 'Cinzel', serif;
}
.field input {
  width: 100%;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 14px 16px;
  color: var(--text);
  font-family: 'Crimson Pro', serif;
  font-size: 1rem;
  outline: none;
  transition: border-color var(--trans);
}
.field input:focus { border-color: var(--gold); }

.btn-primary {
  width: 100%;
  padding: 15px;
  background: linear-gradient(135deg, rgba(201,162,77,.2), rgba(201,162,77,.35));
  border: 1px solid var(--gold);
  border-radius: var(--radius);
  color: var(--gold);
  font-family: 'Cinzel', serif;
  font-size: .85rem;
  letter-spacing: 3px;
  cursor: pointer;
  transition: all var(--trans);
  margin-top: 8px;
}
.btn-primary:hover { background: rgba(201,162,77,.3); box-shadow: 0 0 24px rgba(201,162,77,.3); }
.btn-primary:active { transform: scale(.98); }
.btn-primary:disabled { opacity: .5; cursor: not-allowed; }

#login-error {
  margin-top: 16px;
  font-size: .9rem;
  color: #e74c3c;
  min-height: 20px;
}

/* ══════════════════════════════════
   APP SHELL
══════════════════════════════════ */
#app { display: none; min-height: 100vh; }

/* ── TOP BAR ── */
.topbar {
  position: sticky;
  top: 0;
  z-index: 100;
  height: 60px;
  background: rgba(17,10,5,.92);
  backdrop-filter: blur(10px);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 20px;
}
.topbar .brand {
  font-family: 'Cinzel', serif;
  font-size: 1rem;
  letter-spacing: 3px;
  color: var(--gold);
}
.topbar-actions { display: flex; gap: 12px; align-items: center; }
.icon-btn {
  width: 36px; height: 36px;
  background: transparent;
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--muted);
  font-size: .95rem;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all var(--trans);
}
.icon-btn:hover { border-color: var(--gold); color: var(--gold); }

/* ── TABS ── */
.tabs {
  display: flex;
  gap: 0;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
}
.tabs::-webkit-scrollbar { display: none; }
.tab-btn {
  flex: 0 0 auto;
  padding: 14px 22px;
  background: none;
  border: none;
  border-bottom: 2px solid transparent;
  color: var(--muted);
  font-family: 'Cinzel', serif;
  font-size: .75rem;
  letter-spacing: 2px;
  cursor: pointer;
  transition: all var(--trans);
  white-space: nowrap;
}
.tab-btn:hover { color: var(--text); }
.tab-btn.active { color: var(--gold); border-bottom-color: var(--gold); }

/* ── MAIN CONTENT ── */
.main { padding: 24px 20px; max-width: 900px; margin: 0 auto; }

/* ── STATS ROW ── */
.stats-row {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 12px;
  margin-bottom: 28px;
}
.stat-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 18px 14px;
  text-align: center;
}
.stat-card .num {
  font-family: 'Cinzel', serif;
  font-size: 1.8rem;
  color: var(--gold);
  line-height: 1;
}
.stat-card .lbl {
  font-size: .75rem;
  color: var(--muted);
  letter-spacing: 1px;
  margin-top: 4px;
}

/* ── SECTION HEADER ── */
.section-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 18px;
  flex-wrap: wrap;
  gap: 12px;
}
.section-title {
  font-family: 'Cinzel', serif;
  font-size: 1rem;
  letter-spacing: 2px;
  color: var(--gold);
}
.btn-add {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 10px 18px;
  background: linear-gradient(135deg, rgba(201,162,77,.15), rgba(201,162,77,.28));
  border: 1px solid var(--gold-dim);
  border-radius: 30px;
  color: var(--gold);
  font-family: 'Cinzel', serif;
  font-size: .7rem;
  letter-spacing: 2px;
  cursor: pointer;
  transition: all var(--trans);
}
.btn-add:hover { background: rgba(201,162,77,.35); box-shadow: 0 0 16px rgba(201,162,77,.25); }

/* ── SEARCH ── */
.search-bar {
  display: flex;
  align-items: center;
  gap: 10px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 30px;
  padding: 10px 18px;
  margin-bottom: 20px;
  transition: border-color var(--trans);
}
.search-bar:focus-within { border-color: var(--gold-dim); }
.search-bar i { color: var(--muted); font-size: .9rem; }
.search-bar input {
  flex: 1;
  background: none;
  border: none;
  outline: none;
  color: var(--text);
  font-family: 'Crimson Pro', serif;
  font-size: 1rem;
}
.search-bar input::placeholder { color: var(--muted); }

/* ── PRODUCT GRID ── */
.products-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
  gap: 16px;
}

.product-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  transition: transform var(--trans), box-shadow var(--trans);
  animation: cardIn .3s ease both;
}
@keyframes cardIn {
  from { opacity:0; transform: translateY(12px); }
  to   { opacity:1; transform: translateY(0); }
}
.product-card:hover { transform: translateY(-4px); box-shadow: 0 16px 40px rgba(0,0,0,.4); }

.product-img {
  width: 100%;
  height: 160px;
  object-fit: cover;
  background: var(--surface2);
  display: block;
}
.product-img-placeholder {
  width: 100%;
  height: 160px;
  background: var(--surface2);
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--muted);
  font-size: 2.5rem;
}

.product-body { padding: 16px; }
.product-name {
  font-family: 'Cinzel', serif;
  font-size: .95rem;
  color: var(--text);
  margin-bottom: 4px;
  letter-spacing: .5px;
}
.product-desc {
  font-size: .9rem;
  color: var(--muted);
  line-height: 1.5;
  margin-bottom: 12px;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}
.product-footer {
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 8px;
}
.product-price {
  font-family: 'Cinzel', serif;
  font-size: 1.1rem;
  color: var(--gold);
}
.product-badge {
  font-size: .7rem;
  letter-spacing: 1px;
  padding: 3px 10px;
  border-radius: 20px;
  font-family: 'Cinzel', serif;
}
.badge-active   { background: rgba(46,204,113,.15); color: #2ecc71; border: 1px solid rgba(46,204,113,.3); }
.badge-inactive { background: rgba(192,57,43,.15);  color: #e74c3c; border: 1px solid rgba(192,57,43,.3); }

.product-actions { display: flex; gap: 8px; margin-top: 12px; }
.action-btn {
  flex: 1;
  padding: 8px;
  border-radius: 8px;
  border: 1px solid var(--border);
  background: var(--surface2);
  color: var(--muted);
  font-size: .85rem;
  cursor: pointer;
  transition: all var(--trans);
  display: flex; align-items: center; justify-content: center; gap: 5px;
  font-family: 'Crimson Pro', serif;
}
.action-btn:hover { color: var(--text); border-color: var(--gold-dim); }
.action-btn.delete:hover { color: #e74c3c; border-color: rgba(231,76,60,.4); }

/* ── EMPTY STATE ── */
.empty-state {
  text-align: center;
  padding: 60px 20px;
  color: var(--muted);
}
.empty-state i { font-size: 3rem; color: var(--border); margin-bottom: 16px; display: block; }
.empty-state p { font-size: 1rem; }

/* ══════════════════════════════════
   MODAL
══════════════════════════════════ */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.75);
  backdrop-filter: blur(4px);
  z-index: 200;
  display: flex;
  align-items: flex-end;
  justify-content: center;
  opacity: 0;
  pointer-events: none;
  transition: opacity .3s ease;
}
.modal-overlay.open {
  opacity: 1;
  pointer-events: all;
}
@media(min-width: 640px) {
  .modal-overlay { align-items: center; }
}

.modal {
  width: 100%;
  max-width: 540px;
  max-height: 92vh;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 20px 20px 0 0;
  overflow-y: auto;
  transform: translateY(40px);
  transition: transform .3s ease;
  padding: 28px 24px 40px;
}
@media(min-width: 640px) {
  .modal { border-radius: 20px; transform: translateY(0) scale(.96); }
  .modal-overlay.open .modal { transform: scale(1); }
}
.modal-overlay.open .modal { transform: translateY(0); }

.modal-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 28px;
}
.modal-title {
  font-family: 'Cinzel', serif;
  font-size: 1.1rem;
  letter-spacing: 2px;
  color: var(--gold);
}
.modal-close {
  width: 32px; height: 32px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--muted);
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 1rem;
  transition: all var(--trans);
}
.modal-close:hover { color: var(--text); border-color: var(--gold-dim); }

/* form fields inside modal */
.form-group { margin-bottom: 18px; }
.form-group label {
  display: block;
  font-size: .75rem;
  letter-spacing: 2px;
  color: var(--muted);
  margin-bottom: 8px;
  font-family: 'Cinzel', serif;
}
.form-group input,
.form-group textarea,
.form-group select {
  width: 100%;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 13px 16px;
  color: var(--text);
  font-family: 'Crimson Pro', serif;
  font-size: 1rem;
  outline: none;
  transition: border-color var(--trans);
  resize: vertical;
}
.form-group input:focus,
.form-group textarea:focus,
.form-group select:focus { border-color: var(--gold); }
.form-group textarea { min-height: 90px; }
.form-group select option { background: #1e120a; }

.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }

/* Image upload */
.img-upload-area {
  border: 2px dashed var(--border);
  border-radius: var(--radius);
  padding: 28px;
  text-align: center;
  cursor: pointer;
  transition: all var(--trans);
  position: relative;
  overflow: hidden;
}
.img-upload-area:hover { border-color: var(--gold-dim); background: rgba(201,162,77,.04); }
.img-upload-area input[type=file] { position: absolute; inset: 0; opacity: 0; cursor: pointer; }
.img-upload-area i { font-size: 2rem; color: var(--muted); margin-bottom: 10px; display: block; }
.img-upload-area p { font-size: .9rem; color: var(--muted); }
.img-preview {
  width: 100%;
  max-height: 200px;
  object-fit: cover;
  border-radius: 8px;
  display: none;
  margin-top: 12px;
}

.form-actions { display: flex; gap: 12px; margin-top: 28px; }
.btn-save {
  flex: 1;
  padding: 14px;
  background: linear-gradient(135deg, rgba(201,162,77,.2), rgba(201,162,77,.38));
  border: 1px solid var(--gold);
  border-radius: var(--radius);
  color: var(--gold);
  font-family: 'Cinzel', serif;
  font-size: .8rem;
  letter-spacing: 3px;
  cursor: pointer;
  transition: all var(--trans);
}
.btn-save:hover { background: rgba(201,162,77,.35); box-shadow: 0 0 20px rgba(201,162,77,.3); }
.btn-save:disabled { opacity: .5; cursor: not-allowed; }
.btn-cancel {
  padding: 14px 20px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  color: var(--muted);
  font-family: 'Cinzel', serif;
  font-size: .8rem;
  letter-spacing: 2px;
  cursor: pointer;
  transition: all var(--trans);
}
.btn-cancel:hover { border-color: var(--gold-dim); color: var(--text); }

/* ── CONFIRM DIALOG ── */
.confirm-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.8);
  z-index: 300;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
  opacity: 0;
  pointer-events: none;
  transition: opacity .2s;
}
.confirm-overlay.open { opacity: 1; pointer-events: all; }
.confirm-box {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 32px 28px;
  max-width: 360px;
  width: 100%;
  text-align: center;
  transform: scale(.95);
  transition: transform .2s;
}
.confirm-overlay.open .confirm-box { transform: scale(1); }
.confirm-box h3 { font-family:'Cinzel',serif; color:var(--gold); margin-bottom:12px; letter-spacing:2px; }
.confirm-box p { color: var(--muted); font-size: 1rem; margin-bottom: 28px; }
.confirm-actions { display: flex; gap: 12px; }
.btn-danger {
  flex: 1;
  padding: 12px;
  background: rgba(192,57,43,.2);
  border: 1px solid rgba(192,57,43,.5);
  border-radius: var(--radius);
  color: #e74c3c;
  font-family: 'Cinzel', serif;
  font-size: .75rem;
  letter-spacing: 2px;
  cursor: pointer;
  transition: all var(--trans);
}
.btn-danger:hover { background: rgba(192,57,43,.35); }

/* ── TOAST ── */
.toast {
  position: fixed;
  bottom: 30px;
  left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 30px;
  padding: 12px 24px;
  font-size: .9rem;
  color: var(--text);
  z-index: 400;
  opacity: 0;
  transition: all .3s ease;
  pointer-events: none;
  white-space: nowrap;
  box-shadow: 0 8px 32px rgba(0,0,0,.5);
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
.toast.success { border-color: rgba(46,204,113,.4); color: #2ecc71; }
.toast.error   { border-color: rgba(231,76,60,.4);  color: #e74c3c; }

/* ── LOADING ── */
.loading-spinner {
  display: inline-block;
  width: 18px; height: 18px;
  border: 2px solid var(--border);
  border-top-color: var(--gold);
  border-radius: 50%;
  animation: spin .7s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

.loading-overlay {
  position: fixed;
  inset: 0;
  background: var(--bg);
  z-index: 500;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 16px;
  transition: opacity .4s;
}
.loading-overlay.hidden { opacity: 0; pointer-events: none; }
.loading-overlay .brand {
  font-family: 'Cinzel', serif;
  letter-spacing: 4px;
  color: var(--gold);
  font-size: 1.2rem;
}

/* ── TOGGLE ── */
.toggle-wrap { display: flex; align-items: center; gap: 12px; }
.toggle {
  position: relative;
  width: 44px; height: 24px;
}
.toggle input { opacity: 0; width:0; height:0; }
.toggle-slider {
  position: absolute; inset: 0;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 24px;
  cursor: pointer;
  transition: background var(--trans);
}
.toggle-slider::before {
  content: '';
  position: absolute;
  width: 16px; height: 16px;
  left: 3px; top: 3px;
  background: var(--muted);
  border-radius: 50%;
  transition: all var(--trans);
}
.toggle input:checked + .toggle-slider { background: rgba(46,204,113,.25); border-color: rgba(46,204,113,.4); }
.toggle input:checked + .toggle-slider::before { transform: translateX(20px); background: #2ecc71; }
.toggle-label { font-size: .9rem; color: var(--muted); }

/* ── SECTION CATEGORY TAG ── */
.cat-tag {
  display: inline-block;
  font-size: .65rem;
  letter-spacing: 1.5px;
  padding: 2px 10px;
  border-radius: 20px;
  font-family: 'Cinzel', serif;
  margin-bottom: 8px;
}
.cat-santeria { background: rgba(180,80,20,.2); color: #d4713a; border: 1px solid rgba(180,80,20,.35); }
.cat-vivero   { background: rgba(46,120,46,.2);  color: #5cb85c; border: 1px solid rgba(46,120,46,.35); }
.cat-oraculo  { background: rgba(80,60,180,.2);  color: #8b80d4; border: 1px solid rgba(80,60,180,.35); }
</style>
</head>
<body>

<!-- LOADING -->
<div class="loading-overlay" id="loadingOverlay">
  <div class="loading-spinner"></div>
  <div class="brand">ARTILUGIOS</div>
</div>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-card">
    <div class="brand">ARTILUGIOS</div>
    <div class="subtitle">PANEL DE GESTIÓN</div>
    <div class="field">
      <label>CORREO</label>
      <input type="email" id="loginEmail" placeholder="agus@artilugios.com" autocomplete="email"/>
    </div>
    <div class="field">
      <label>CONTRASEÑA</label>
      <input type="password" id="loginPass" placeholder="••••••••" autocomplete="current-password"/>
    </div>
    <button class="btn-primary" id="loginBtn" onclick="handleLogin()">INGRESAR</button>
    <div id="login-error"></div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <div class="topbar">
    <div class="brand">✦ PANEL</div>
    <div class="topbar-actions">
      <button class="icon-btn" onclick="reloadProducts()" title="Actualizar">
        <i class="fas fa-sync-alt"></i>
      </button>
      <button class="icon-btn" onclick="handleLogout()" title="Salir">
        <i class="fas fa-sign-out-alt"></i>
      </button>
    </div>
  </div>

  <div class="tabs">
    <button class="tab-btn active" data-section="all" onclick="switchTab(this, 'all')">TODO</button>
    <button class="tab-btn" data-section="santeria" onclick="switchTab(this, 'santeria')">🕯️ SANTERÍA</button>
    <button class="tab-btn" data-section="vivero" onclick="switchTab(this, 'vivero')">🌿 VIVERO</button>
    <button class="tab-btn" data-section="oraculo" onclick="switchTab(this, 'oraculo')">🔮 ORÁCULO</button>
  </div>

  <div class="main">
    <div class="stats-row">
      <div class="stat-card">
        <div class="num" id="stat-total">—</div>
        <div class="lbl">TOTAL</div>
      </div>
      <div class="stat-card">
        <div class="num" id="stat-active">—</div>
        <div class="lbl">ACTIVOS</div>
      </div>
      <div class="stat-card">
        <div class="num" id="stat-section">—</div>
        <div class="lbl">EN SECCIÓN</div>
      </div>
    </div>

    <div class="section-header">
      <div class="section-title" id="section-label">TODOS LOS PRODUCTOS</div>
      <button class="btn-add" onclick="openModal()">
        <i class="fas fa-plus"></i> AGREGAR
      </button>
    </div>

    <div class="search-bar">
      <i class="fas fa-search"></i>
      <input type="text" id="searchInput" placeholder="Buscar producto..." oninput="filterProducts()"/>
    </div>

    <div class="products-grid" id="productsGrid"></div>
  </div>
</div>

<!-- PRODUCT MODAL -->
<div class="modal-overlay" id="modalOverlay" onclick="handleOverlayClick(event)">
  <div class="modal" id="productModal">
    <div class="modal-header">
      <div class="modal-title" id="modalTitle">NUEVO PRODUCTO</div>
      <button class="modal-close" onclick="closeModal()"><i class="fas fa-times"></i></button>
    </div>

    <input type="hidden" id="productId"/>

    <div class="form-group">
      <label>SECCIÓN</label>
      <select id="productSection">
        <option value="santeria">🕯️ Santería</option>
        <option value="vivero">🌿 Vivero</option>
        <option value="oraculo">🔮 Oráculo</option>
      </select>
    </div>

    <div class="form-group">
      <label>NOMBRE DEL PRODUCTO</label>
      <input type="text" id="productName" placeholder="Ej: Vela de miel 7 días"/>
    </div>

    <div class="form-group">
      <label>DESCRIPCIÓN</label>
      <textarea id="productDesc" placeholder="Descripción breve del producto..."></textarea>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label>PRECIO ($UYU)</label>
        <input type="number" id="productPrice" placeholder="0" min="0" step="1"/>
      </div>
      <div class="form-group">
        <label>STOCK</label>
        <input type="number" id="productStock" placeholder="0" min="0"/>
      </div>
    </div>

    <div class="form-group">
      <label>CATEGORÍA / ETIQUETA</label>
      <input type="text" id="productCategory" placeholder="Ej: Velas, Cristales, Cactus..."/>
    </div>

    <div class="form-group">
      <label>IMAGEN</label>
      <div class="img-upload-area" id="imgUploadArea">
        <input type="file" id="imgFile" accept="image/*" onchange="previewImage(event)"/>
        <i class="fas fa-camera"></i>
        <p>Tocá para subir una foto</p>
      </div>
      <img id="imgPreview" class="img-preview" alt="Preview"/>
      <input type="hidden" id="productImageUrl"/>
    </div>

    <div class="form-group">
      <div class="toggle-wrap">
        <label class="toggle">
          <input type="checkbox" id="productActive" checked/>
          <span class="toggle-slider"></span>
        </label>
        <span class="toggle-label">Producto activo (visible en el sitio)</span>
      </div>
    </div>

    <div class="form-actions">
      <button class="btn-cancel" onclick="closeModal()">CANCELAR</button>
      <button class="btn-save" id="saveBtn" onclick="saveProduct()">GUARDAR</button>
    </div>
  </div>
</div>

<!-- CONFIRM DELETE -->
<div class="confirm-overlay" id="confirmOverlay">
  <div class="confirm-box">
    <h3>ELIMINAR</h3>
    <p>¿Eliminás este producto? Esta acción no se puede deshacer.</p>
    <div class="confirm-actions">
      <button class="btn-cancel" onclick="closeConfirm()">CANCELAR</button>
      <button class="btn-danger" id="confirmDeleteBtn">ELIMINAR</button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
// ══════════════════════════════════════════════════════
// INIT SUPABASE
// ══════════════════════════════════════════════════════
const { createClient } = supabase;
let sb;
let allProducts = [];
let currentSection = 'all';
let editingId = null;
let pendingDeleteId = null;

function initSupabase() {
  try {
    sb = createClient(window.SUPABASE_URL, window.SUPABASE_ANON_KEY);
    return true;
  } catch(e) {
    showToast('Error al conectar con la base de datos', 'error');
    return false;
  }
}

// ══════════════════════════════════════════════════════
// AUTH
// ══════════════════════════════════════════════════════
async function handleLogin() {
  if (!sb) { showToast('Configurá Supabase primero', 'error'); return; }
  const email = document.getElementById('loginEmail').value.trim();
  const pass  = document.getElementById('loginPass').value;
  const btn   = document.getElementById('loginBtn');
  const errEl = document.getElementById('login-error');

  if (!email || !pass) { errEl.textContent = 'Completá todos los campos.'; return; }

  btn.disabled = true;
  btn.textContent = 'INGRESANDO...';
  errEl.textContent = '';

  const { error } = await sb.auth.signInWithPassword({ email, password: pass });
  if (error) {
    errEl.textContent = 'Usuario o contraseña incorrectos.';
    btn.disabled = false;
    btn.textContent = 'INGRESAR';
  } else {
    showApp();
  }
}

async function handleLogout() {
  await sb.auth.signOut();
  document.getElementById('app').style.display = 'none';
  document.getElementById('login-screen').style.display = 'flex';
}

document.getElementById('loginPass').addEventListener('keydown', e => {
  if (e.key === 'Enter') handleLogin();
});

// ══════════════════════════════════════════════════════
// APP
// ══════════════════════════════════════════════════════
async function showApp() {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  await loadProducts();
}

async function reloadProducts() {
  await loadProducts();
  showToast('Actualizado ✦', 'success');
}

async function loadProducts() {
  if (!sb) return;
  const { data, error } = await sb
    .from('productos')
    .select('*')
    .order('created_at', { ascending: false });

  if (error) { showToast('Error al cargar productos', 'error'); return; }
  allProducts = data || [];
  renderProducts();
  updateStats();
}

function switchTab(el, section) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  currentSection = section;

  const labels = {
    all: 'TODOS LOS PRODUCTOS',
    santeria: '🕯️ SANTERÍA',
    vivero: '🌿 VIVERO',
    oraculo: '🔮 ORÁCULO'
  };
  document.getElementById('section-label').textContent = labels[section];
  document.getElementById('searchInput').value = '';
  renderProducts();
  updateStats();
}

function filterProducts() {
  renderProducts();
}

function getFiltered() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  return allProducts.filter(p => {
    const matchSection = currentSection === 'all' || p.seccion === currentSection;
    const matchSearch  = !q || p.nombre.toLowerCase().includes(q) || (p.descripcion||'').toLowerCase().includes(q);
    return matchSection && matchSearch;
  });
}

function updateStats() {
  const total   = allProducts.length;
  const active  = allProducts.filter(p => p.activo).length;
  const section = currentSection === 'all'
    ? allProducts.length
    : allProducts.filter(p => p.seccion === currentSection).length;

  document.getElementById('stat-total').textContent   = total;
  document.getElementById('stat-active').textContent  = active;
  document.getElementById('stat-section').textContent = section;
}

function renderProducts() {
  const grid = document.getElementById('productsGrid');
  const list = getFiltered();

  if (list.length === 0) {
    grid.innerHTML = `
      <div class="empty-state" style="grid-column:1/-1">
        <i class="fas fa-box-open"></i>
        <p>No hay productos en esta sección.<br>Agregá el primero.</p>
      </div>`;
    return;
  }

  grid.innerHTML = list.map(p => {
    const catClass = `cat-${p.seccion}`;
    const imgEl = p.imagen_url
      ? `<img class="product-img" src="${p.imagen_url}" alt="${p.nombre}" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">`
        + `<div class="product-img-placeholder" style="display:none"><i class="fas fa-image"></i></div>`
      : `<div class="product-img-placeholder"><i class="fas fa-image"></i></div>`;

    const price = p.precio ? `$${Number(p.precio).toLocaleString('es-UY')}` : 'Sin precio';
    const badge = p.activo
      ? `<span class="product-badge badge-active">ACTIVO</span>`
      : `<span class="product-badge badge-inactive">OCULTO</span>`;

    return `
    <div class="product-card" id="card-${p.id}">
      ${imgEl}
      <div class="product-body">
        <span class="cat-tag ${catClass}">${p.seccion.toUpperCase()}</span>
        <div class="product-name">${p.nombre}</div>
        <div class="product-desc">${p.descripcion || 'Sin descripción'}</div>
        <div class="product-footer">
          <div class="product-price">${price}</div>
          ${badge}
        </div>
        <div class="product-actions">
          <button class="action-btn" onclick="openModal('${p.id}')">
            <i class="fas fa-pen"></i> Editar
          </button>
          <button class="action-btn delete" onclick="confirmDelete('${p.id}')">
            <i class="fas fa-trash"></i>
          </button>
        </div>
      </div>
    </div>`;
  }).join('');
}

// ══════════════════════════════════════════════════════
// MODAL
// ══════════════════════════════════════════════════════
function openModal(id = null) {
  editingId = id;
  const overlay = document.getElementById('modalOverlay');
  const title   = document.getElementById('modalTitle');

  // reset form
  document.getElementById('productId').value       = '';
  document.getElementById('productName').value     = '';
  document.getElementById('productDesc').value     = '';
  document.getElementById('productPrice').value    = '';
  document.getElementById('productStock').value    = '';
  document.getElementById('productCategory').value = '';
  document.getElementById('productActive').checked = true;
  document.getElementById('productImageUrl').value = '';
  document.getElementById('imgPreview').style.display = 'none';
  document.getElementById('imgFile').value = '';
  document.getElementById('imgUploadArea').querySelector('p').textContent = 'Tocá para subir una foto';

  if (id) {
    title.textContent = 'EDITAR PRODUCTO';
    const p = allProducts.find(x => x.id === id);
    if (p) {
      document.getElementById('productSection').value   = p.seccion;
      document.getElementById('productName').value      = p.nombre;
      document.getElementById('productDesc').value      = p.descripcion || '';
      document.getElementById('productPrice').value     = p.precio || '';
      document.getElementById('productStock').value     = p.stock || '';
      document.getElementById('productCategory').value  = p.categoria || '';
      document.getElementById('productActive').checked  = p.activo;
      document.getElementById('productImageUrl').value  = p.imagen_url || '';
      if (p.imagen_url) {
        const preview = document.getElementById('imgPreview');
        preview.src = p.imagen_url;
        preview.style.display = 'block';
        document.getElementById('imgUploadArea').querySelector('p').textContent = 'Cambiar imagen';
      }
    }
  } else {
    title.textContent = 'NUEVO PRODUCTO';
    // preselect current section tab
    if (currentSection !== 'all') {
      document.getElementById('productSection').value = currentSection;
    }
  }

  overlay.classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
  document.body.style.overflow = '';
  editingId = null;
}

function handleOverlayClick(e) {
  if (e.target === document.getElementById('modalOverlay')) closeModal();
}

function previewImage(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    const preview = document.getElementById('imgPreview');
    preview.src = ev.target.result;
    preview.style.display = 'block';
    document.getElementById('imgUploadArea').querySelector('p').textContent = file.name;
  };
  reader.readAsDataURL(file);
}

// Función mágica para comprimir y convertir a WEBP
function compressImageToWebP(file, maxWidth = 800, quality = 0.8) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.readAsDataURL(file);
    reader.onload = (event) => {
      const img = new Image();
      img.src = event.target.result;
      img.onload = () => {
        const canvas = document.createElement('canvas');
        let width = img.width;
        let height = img.height;

        // Si la imagen es más ancha que el máximo, achicamos proporcionalmente
        if (width > maxWidth) {
          height = Math.round((height * maxWidth) / width);
          width = maxWidth;
        }

        canvas.width = width;
        canvas.height = height;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, width, height);

        // Convertir el canvas a un archivo WEBP comprimido
        canvas.toBlob((blob) => {
          resolve(blob);
        }, 'image/webp', quality);
      };
      img.onerror = (error) => reject(error);
    };
    reader.onerror = (error) => reject(error);
  });
}

// Nueva función de subida a Supabase
async function uploadImage(file) {
  // 1. Convertimos y comprimimos la imagen de Agus a WEBP
  const webpBlob = await compressImageToWebP(file, 800, 0.8);
  
  // 2. Le ponemos nombre con extensión .webp
  const path = `productos/${Date.now()}.webp`;
  
  // 3. Subimos el archivo ultraliviano a Supabase
  const { error } = await sb.storage.from('imagenes').upload(path, webpBlob, {
    cacheControl: '3600',
    upsert: false,
    contentType: 'image/webp'
  });
  
  if (error) throw error;
  const { data } = sb.storage.from('imagenes').getPublicUrl(path);
  return data.publicUrl;
}

async function saveProduct() {
  const btn = document.getElementById('saveBtn');
  btn.disabled = true;
  btn.innerHTML = '<span class="loading-spinner"></span>';

  try {
    const name    = document.getElementById('productName').value.trim();
    const section = document.getElementById('productSection').value;
    if (!name) { showToast('El nombre es obligatorio', 'error'); return; }

    let imageUrl = document.getElementById('productImageUrl').value;
    const imgFile = document.getElementById('imgFile').files[0];
    if (imgFile) {
      imageUrl = await uploadImage(imgFile);
    }

    const payload = {
      seccion:     section,
      nombre:      name,
      descripcion: document.getElementById('productDesc').value.trim(),
      precio:      parseFloat(document.getElementById('productPrice').value) || null,
      stock:       parseInt(document.getElementById('productStock').value) || null,
      categoria:   document.getElementById('productCategory').value.trim(),
      activo:      document.getElementById('productActive').checked,
      imagen_url:  imageUrl || null,
    };

    let error;
    if (editingId) {
      ({ error } = await sb.from('productos').update(payload).eq('id', editingId));
    } else {
      ({ error } = await sb.from('productos').insert([payload]));
    }

    if (error) throw error;

    closeModal();
    await loadProducts();
    showToast(editingId ? 'Producto actualizado ✦' : 'Producto creado ✦', 'success');

  } catch(e) {
    showToast('Error: ' + (e.message || 'algo salió mal'), 'error');
  } finally {
    btn.disabled = false;
    btn.textContent = 'GUARDAR';
  }
}

// ══════════════════════════════════════════════════════
// DELETE
// ══════════════════════════════════════════════════════
function confirmDelete(id) {
  pendingDeleteId = id;
  document.getElementById('confirmOverlay').classList.add('open');
}
function closeConfirm() {
  document.getElementById('confirmOverlay').classList.remove('open');
  pendingDeleteId = null;
}
document.getElementById('confirmDeleteBtn').addEventListener('click', async () => {
  if (!pendingDeleteId) return;
  const { error } = await sb.from('productos').delete().eq('id', pendingDeleteId);
  closeConfirm();
  if (error) { showToast('Error al eliminar', 'error'); return; }
  await loadProducts();
  showToast('Producto eliminado', 'success');
});

// ══════════════════════════════════════════════════════
// TOAST
// ══════════════════════════════════════════════════════
let toastTimer;
function showToast(msg, type = '') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast show ' + type;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { el.className = 'toast'; }, 3200);
}

// ══════════════════════════════════════════════════════
// BOOT
// ══════════════════════════════════════════════════════
window.addEventListener('load', async () => {
  const ok = initSupabase();
  const overlay = document.getElementById('loadingOverlay');

  if (!ok) {
    overlay.classList.add('hidden');
    return;
  }

  // Check existing session
  const { data: { session } } = await sb.auth.getSession();
  overlay.classList.add('hidden');

  if (session) {
    showApp();
  }
  // else: login screen is already visible
});
</script>
</body>
</html>

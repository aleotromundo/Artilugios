<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Panel — Artilugios</title>
  
  <!-- 🔗 VINCULACIÓN PWA (OBLIGATORIO) -->
  <link rel="manifest" href="./manifest.json">
  <meta name="theme-color" content="#1a0f07">
  <link rel="icon" href="./logo.png" type="image/png">

  <!-- Estilos básicos para que no se vea roto -->
  <style>
    body { margin: 0; font-family: system-ui, sans-serif; background: #110a05; color: #fff; }
    .container { max-width: 100%; padding: 1rem; }
    /* Aquí iría tu CSS real */
  </style>
</head>
<body>
  <div class="container">
    <!-- Pega aquí todo el contenido visual de tu panel (formularios, botones, etc.) -->
    ARTILUGIOS PANEL DE GESTIÓN<br>
    CORREO | CONTRASEÑA | INGRESAR<br>
    ✦ PANEL DE CONTROL | TODO | SANTERÍA | VIVERO | ORÁCULO<br>
    PRODUCTOS | AGREGAR NUEVO PRODUCTO<br>
    SECCIÓN: Santería | Vivero | Oráculo<br>
    NOMBRE | DESCRIPCIÓN BREVE | DESCRIPCIÓN LARGA<br>
    PRECIO ($ UYU) | CATEGORÍA | GALERÍA DE IMÁGENES<br>
    <button>GUARDAR</button>
  </div>

  <!-- 🔧 REGISTRO DEL SERVICE WORKER -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js')
          .then(reg => console.log('✅ SW registrado:', reg.scope))
          .catch(err => console.error('❌ Error al registrar SW:', err));
      });
    }
  </script>
</body>
</html>
